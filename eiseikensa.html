<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
      body { background-color: #f8f9fa; }
      .card { border-radius: 15px; overflow: hidden; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
      .sticky-footer { position: sticky; bottom: 0; background: white; padding: 15px; border-top: 1px solid #eee; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="bg-primary text-white text-center py-4 mb-4">
            <h4 class="mb-1 font-weight-bold">衛生検査記録簿</h4>
            <div class="opacity-75" style="font-size:0.9rem">Sổ ghi chép kiểm tra vệ sinh</div>
        </div>
        
        <div class="container mb-5">
            <form method="POST" action="<?= deployURL ?>" onsubmit="return (event.submitter.name === 'modoru') ? true : confirm('登録しますか？ / Bạn có muốn đăng ký?');">
                <div class="card mb-4">
                    <div class="card-body bg-white border-bottom text-center">
                        <div class="row">
                            <div class="col-6 border-right">
                                <small class="text-muted d-block small">コード / Mã số</small>
                                <span class="h5 font-weight-bold"><?= valueC ?></span>
                            </div>
                            <div class="col-6">
                                <small class="text-muted d-block small">氏名 / Họ tên</small>
                                <span class="h5 font-weight-bold"><?= valueD ?></span>
                            </div>
                        </div>
                    </div>
                    
                    <input type="hidden" name="valueC" value="<?= (valueC === undefined) ? '' : valueC ?>">
                    <input type="hidden" name="valueD" value="<?= (valueD === undefined) ? '' : valueD ?>">
                    
                    <div>
                        <?!= createSanitary ?>
                    </div>
                </div>

                <div class="sticky-footer d-flex justify-content-between">
                    <button type="submit" class="btn btn-outline-secondary btn-lg px-4" name="modoru" value="true">
                        戻る <small class="d-block text-lowercase" style="font-size:0.6rem">Quay lại</small>
                    </button>
                    <button type="submit" class="btn btn-success btn-lg px-5 font-weight-bold" name="submit" value="true">
                        登録完了 <small class="d-block text-lowercase" style="font-size:0.6rem">Hoàn thành</small>
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
