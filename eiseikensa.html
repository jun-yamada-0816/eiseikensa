<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script>
        function confirmSubmission(isBackButton) {
            if (isBackButton) {
                return true; // 戻るボタンの場合は確認なしで処理を続行
            }
            return confirm("登録してよろしいですか？"); // 登録時は確認ダイアログを表示
        }
    </script>
</head>
<body>
    <div class="container" style="max-width: 600px; margin-top: 50px;">
        <h2 class="text-center mb-4">衛生検査記録簿</h2>
        <form class="mb-5" method="POST" action="<?= deployURL ?>" onsubmit="return confirmSubmission(event.submitter.name === 'modoru');">
            <input type="hidden" name="valueC" value="<?= valueC ?>">
            <input type="hidden" name="valueD" value="<?= valueD ?>">

            <div class="text-center mb-4">
                <p><strong>社員コード:</strong> <?= valueC ?></p>
                <p><strong>氏名:</strong> <?= valueD ?></p>
                <input type="hidden" name="modoru" value="true"> <!-- 戻るボタン用の隠しフィールド -->
            </div>

            <div class="mb-4">
                <h5 class="text-center">検査項目</h5>
                <div style="text-align: left;">
                    <? output._ = createSanitary ?>
                </div>
            </div>

            <div class="d-flex justify-content-between mb-4">
                <button type="submit" class="btn btn-primary btn-lg" name="submit" value="true">登録</button>
                <button type="submit" class="btn btn-outline-secondary btn-lg" name="modoru" value="true">戻る</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
